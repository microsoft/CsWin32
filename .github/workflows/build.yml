name: 🏗️ Build & Test

on:
  pull_request:
  push:
    branches:
    - main
    - 'v*.*'
    - 'validate/*'
    paths-ignore:
    - doc/
    - '*.md'
    - .vscode/
    - azure-pipelines/release.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NBGV_GitEngine: Disabled
  BuildConfiguration: Release

jobs:
  build:
    name: 🛠️ Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 🛠️ Build
      run: dotnet build -t:build,pack -c ${{ env.BuildConfiguration }} -warnAsError -warnNotAsError:NU1901,NU1902,NU1903,NU1904
    - name: 📦 Upload build output
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: build-windows
        path: bin/
        retention-days: 1

  test-fast-windows:
    name: 🧪 Tests (Windows)
    needs: build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: build-windows
        path: bin/
    - name: 🧪 Run tests
      run: |
        dotnet test --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory!=HighMemory&TestCategory!=RequiresHardware" `
          --blame-hang-timeout 600s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
      shell: pwsh
    - name: 📢 Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: test-results-windows
        path: TestResults/
        retention-days: 5

  test-hardware-windows:
    name: 🧪 Tests (Windows, Hardware)
    needs: build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: build-windows
        path: bin/
    # GitHub-hosted windows-latest runners can execute these COM/Direct2D/WMI/Shell runtime
    # tests (Direct2D uses the WARP software rasterizer, so no GPU is required). They remain
    # tagged RequiresHardware so the locked-down Azure DevOps 1ES build pool keeps excluding
    # them, but we exercise the real runtime code paths here rather than only on dev machines.
    - name: 🧪 Run hardware-dependent tests
      run: |
        dotnet test --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory=RequiresHardware" `
          --blame-hang-timeout 600s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
      shell: pwsh
    - name: 📢 Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: test-results-hardware-windows
        path: TestResults/
        retention-days: 5

  test-fast-linux:
    name: 🧪 Tests (Linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 🛠️ Build
      run: dotnet build -t:build,pack -c ${{ env.BuildConfiguration }} -warnAsError -warnNotAsError:NU1901,NU1902,NU1903,NU1904
    - name: 🧪 Run tests
      run: |
        # Only run cross-platform test projects. Windows-specific projects
        # (GenerationSandbox.*, SpellChecker, WinRTInteropTest) use Windows TFMs
        # and produce app hosts that cannot execute on Linux.
        dotnet test test/CsWin32Generator.Tests --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory!=HighMemory&TestCategory!=RequiresHardware" `
          --blame-hang-timeout 600s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
        dotnet test test/Microsoft.Windows.CsWin32.Tests --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory!=HighMemory&TestCategory!=RequiresHardware" `
          --blame-hang-timeout 600s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
      shell: pwsh
    - name: 📢 Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: test-results-linux
        path: TestResults/
        retention-days: 5

  test-heavy:
    name: 🧪 Heavy (${{ matrix.name }})
    needs: build
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: FastMethods
            filter: "TestCategory=HighMemory&TestShard=FastMethods"
            threads: "2"
          - name: EverythingModern
            filter: "TestCategory=HighMemory&TestShard=EverythingModern"
            threads: "2"
          - name: EverythingLegacy
            filter: "TestCategory=HighMemory&TestShard=EverythingLegacy"
            threads: "2"
          - name: FullGen-Net8
            filter: "TestCategory=HighMemory&TestShard=FullGen-Net8"
            threads: "1"
          - name: FullGen-Net9
            filter: "TestCategory=HighMemory&TestShard=FullGen-Net9"
            threads: "1"
          - name: FullGen-Net9-Ptrs
            filter: "TestCategory=HighMemory&TestShard=FullGen-Net9-Ptrs"
            threads: "1"
          - name: Default
            filter: "TestCategory=HighMemory&TestShard!=FastMethods&TestShard!=EverythingModern&TestShard!=EverythingLegacy&TestShard!=FullGen-Net8&TestShard!=FullGen-Net9&TestShard!=FullGen-Net9-Ptrs"
            threads: "1"
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: build-windows
        path: bin/
    - name: 🧪 Run heavy tests
      run: |
        dotnet test test/Microsoft.Windows.CsWin32.Tests --no-build -c ${{ env.BuildConfiguration }} `
          --filter "${{ matrix.filter }}" `
          --blame-hang-timeout 7200s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults `
          -- RunConfiguration.TreatNoTestsAsError=false
        dotnet test test/CsWin32Generator.Tests --no-build -c ${{ env.BuildConfiguration }} `
          --filter "${{ matrix.filter }}" `
          --blame-hang-timeout 7200s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults `
          -- RunConfiguration.TreatNoTestsAsError=false
      shell: pwsh
      env:
        XUNIT_MAX_PARALLEL_THREADS: ${{ matrix.threads }}
    - name: 📢 Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: test-results-heavy-${{ matrix.name }}
        path: TestResults/
        retention-days: 5

  integration-test:
    name: 🧪 Integration tests
    needs: build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: build-windows
        path: bin/
    - name: 🔧 Copy integration tests out of the repo
      run: Copy-Item -Recurse integration-tests ${{ runner.temp }}/integration-tests
      shell: pwsh
    - name: 🔧 Configure nupkg source
      run: |
        $nupkg = (Get-ChildItem -Path bin/Packages/Release/NuGet -Filter *.nupkg)[0].Name
        if ($nupkg -match 'Microsoft\.Windows\.CsWin32\.(.+)\.nupkg') {
          $version = $Matches[1]
          Write-Host "Will consume Microsoft.Windows.CsWin32 $version"
          Add-Content -Path $env:GITHUB_ENV -Value "NuGetPackageVersion=$version"
        }
        # Point the integration-test nuget.config at the local package output
        $nugetConfig = "${{ runner.temp }}/integration-tests/nuget.config"
        $pkgDir = (Resolve-Path bin/Packages/Release/NuGet).Path
        (Get-Content $nugetConfig) -replace '%PIPELINE_WORKSPACE%\\deployables-Windows', $pkgDir | Set-Content $nugetConfig
      shell: pwsh
    - name: 🧪 MSBuild non-sdk style
      run: |
        $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        & $msbuild "${{ runner.temp }}\integration-tests\nonsdk\nonsdk.csproj" /r
      shell: pwsh
    - name: 🧪 MSBuild sdk-style
      run: |
        $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        & $msbuild "${{ runner.temp }}\integration-tests\sdk\sdk.csproj" /r
      shell: pwsh
    - name: 🧪 dotnet build sdk-style
      run: dotnet build
      working-directory: ${{ runner.temp }}/integration-tests/sdk
    - name: 🧪 dotnet build sdk-roslyn5 (extensionReceiver)
      run: dotnet build
      working-directory: ${{ runner.temp }}/integration-tests/sdk-roslyn5
    - name: 🧪 MSBuild buildtask-sdk-style
      run: |
        $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        & $msbuild "${{ runner.temp }}\integration-tests\buildtask-sdk\buildtask-sdk.slnx" /r
      shell: pwsh
    - name: 🧪 dotnet publish buildtask-sdk-style
      run: dotnet publish -r win-x64
      working-directory: ${{ runner.temp }}/integration-tests/buildtask-sdk

  validate:
    name: ✅ Validate
    if: always()
    needs: [build, test-fast-windows, test-hardware-windows, test-fast-linux, test-heavy, integration-test]
    runs-on: ubuntu-latest
    steps:
    - name: Check results
      run: |
        echo "Build: ${{ needs.build.result }}"
        echo "Windows tests: ${{ needs.test-fast-windows.result }}"
        echo "Windows hardware tests: ${{ needs.test-hardware-windows.result }}"
        echo "Linux tests: ${{ needs.test-fast-linux.result }}"
        echo "Heavy tests: ${{ needs.test-heavy.result }}"
        echo "Integration tests: ${{ needs.integration-test.result }}"
        if [[ "${{ needs.build.result }}" != "success" ||
              "${{ needs.test-fast-windows.result }}" != "success" ||
              "${{ needs.test-hardware-windows.result }}" != "success" ||
              "${{ needs.test-fast-linux.result }}" != "success" ||
              "${{ needs.test-heavy.result }}" != "success" ||
              "${{ needs.integration-test.result }}" != "success" ]]; then
          echo "::error::One or more required jobs failed or were cancelled."
          exit 1
        fi
