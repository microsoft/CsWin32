name: 🏗️ Build & Test

on:
  pull_request:
  push:
    branches:
    - main
    - 'v*.*'
    - 'validate/*'
    paths-ignore:
    - doc/
    - '*.md'
    - .vscode/
    - azure-pipelines/release.yml
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NBGV_GitEngine: Disabled
  BuildConfiguration: Release

jobs:
  build:
    name: 🛠️ Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 🛠️ Build
      run: dotnet build -t:build,pack -c ${{ env.BuildConfiguration }} -warnAsError -warnNotAsError:NU1901,NU1902,NU1903,NU1904
    - name: 📦 Upload build output
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: bin/
        retention-days: 1

  test-fast-windows:
    name: 🧪 Tests (Windows)
    needs: build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: bin/
    - name: 🧪 Run tests
      run: |
        dotnet test --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory!=HighMemory&TestCategory!=RequiresHardware" `
          --blame-hang-timeout 600s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
      shell: pwsh
    - name: 📢 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-windows
        path: TestResults/
        retention-days: 5

  test-fast-linux:
    name: 🧪 Tests (Linux)
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: bin/
    - name: 🧪 Run tests
      run: |
        dotnet test --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory!=HighMemory&TestCategory!=RequiresHardware&WindowsOnly!=true" `
          --blame-hang-timeout 600s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
      shell: pwsh
    - name: 📢 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-linux
        path: TestResults/
        retention-days: 5

  test-heavy:
    name: 🧪 Heavy tests (Windows)
    needs: build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: ⚙️ Install prerequisites
      run: ./init.ps1 -UpgradePrerequisites -NoNuGetCredProvider
      shell: pwsh
    - name: 📦 Download build
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: bin/
    - name: 🧪 Run heavy tests (parallelism limited to fit in 16GB)
      run: |
        # Run each heavy test project separately with limited parallelism.
        # Each test uses ~4GB peak memory; with maxParallelThreads=2, peak is ~8GB which fits in 16GB.
        dotnet test --no-build -c ${{ env.BuildConfiguration }} `
          --filter "TestCategory=HighMemory" `
          --blame-hang-timeout 1800s `
          --blame-crash `
          --logger trx `
          --results-directory TestResults
      shell: pwsh
      env:
        XUNIT_MAX_PARALLEL_THREADS: 2
    - name: 📢 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-heavy
        path: TestResults/
        retention-days: 5
